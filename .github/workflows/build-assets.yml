name: Build Frontend Assets

on:
  push:
    branches: [main]
    paths:
      - 'resources/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'

permissions:
  contents: write

jobs:
  build:
    name: Build and Commit Assets
    runs-on: [self-hosted, Linux]
    container:
      image: ghcr.io/team-nifty-gmbh/flux-ci:php8.5
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      PAT: ${{ secrets.PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ env.PAT }}

      - name: Fix git ownership
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Configure Composer GitHub auth
        run: composer config --global github-oauth.github.com ${{ github.token }}

      - name: Configure private Packagist auth
        run: |
          mkdir -p /github/home/.config/composer
          echo "${{ secrets.AUTH_BASE64 }}" | base64 -d > /github/home/.config/composer/auth.json

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --no-dev

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Commit built assets
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Build frontend assets
          file_pattern: 'dist/*'
