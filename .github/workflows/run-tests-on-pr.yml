name: tests

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

jobs:
  laravel:
    name: Laravel ${{ matrix.laravel }} (PHP ${{ matrix.php-versions }}) - ${{ matrix.browser }}
    runs-on: [self-hosted, Linux]
    container:
      image: ubuntu:24.04
    env:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: password
      BROADCAST_DRIVER: log
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEILISEARCH_HOST: http://meilisearch:7700
    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.4']
        browser: ['chrome']
        laravel: ['12.*']
        include:
          - laravel: 12.*
            testbench: 10.*

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: false
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        options: >-
          --tmpfs /var/lib/mysql
          --tmpfs /var/log/mysql
          --tmpfs /tmp
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
      meilisearch:
        image: getmeili/meilisearch:latest
        options: --health-cmd="curl -s http://localhost:7700/health" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Install libsodium
        run: apt-get update && apt-get install -y --no-install-recommends libsodium23

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: >-
            mbstring, dom, fileinfo, mysql, gd, zip, bcmath, intl, exif, imagick, sodium,
            -amqp, -dba, -odbc, -pdo_odbc, -pdo_pgsql, -pdo_sqlsrv, -pgsql,
            -snmp, -sqlsrv, -tidy, -xsl, -zmq, -memcached
          coverage: xdebug

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Change Laravel Version Dependencies
        run: composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm i

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Pint
        run: ./vendor/bin/pint --test --parallel

      - name: Prettier
        run: npx prettier . --check

      - name: Clear Orchestra Testbench Cache
        run: ./vendor/bin/testbench view:clear

      - name: Create schema
        run: |
          ./vendor/bin/testbench migrate --force
          ./vendor/bin/testbench schema:dump

      - name: Run Unit Tests
        run: composer test-unit

      - name: Run Livewire Tests
        run: composer test-livewire

      - name: Run Feature Tests
        run: composer test-feature

      - name: Run Browser Tests
        run: composer test-browser

      - name: Upload Browser Test Artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: browser-test-artifacts-${{ matrix.browser }}-${{ matrix.php-versions }}
          path: |
            tests/Browser/Screenshots/
            vendor/orchestra/testbench-core/laravel/storage/logs/
          retention-days: 7

  cleanup:
    name: Cleanup Docker resources
    runs-on: [self-hosted, Linux]
    needs: laravel
    if: always()
    steps:
      - name: Prune unused Docker images older than 7 days
        run: docker image prune -af --filter "until=168h"
